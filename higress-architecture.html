<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Higress 技术架构</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      min-height: 100vh;
      padding: 2rem;
      color: #e2e8f0;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { margin-bottom: 1.5rem; }
    .header-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.4rem; }
    .pulse-dot { width: 10px; height: 10px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.3rem; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: 1rem; margin-left: 1.6rem; }
    .diagram-container {
      background: rgba(15, 23, 42, 0.5); border-radius: 1rem;
      border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto;
    }
    svg { width: 100%; min-width: 1100px; display: block; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 1rem; }
  </style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-row">
    <div class="pulse-dot"></div>
    <h1>Higress 技术架构</h1>
  </div>
  <p class="subtitle">三层分离：管理面配置 · 控制面翻译下发 · 数据面执行（Envoy + Wasm 沙箱隔离）</p>
</div>

<div class="diagram-container">
  <svg viewBox="0 0 1200 860">
    <defs>
      <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
      </marker>
      <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
      </marker>
      <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
      </marker>
      <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
      </marker>
      <marker id="arr-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
      </marker>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
      </pattern>
    </defs>

    <rect width="100%" height="100%" fill="url(#grid)"/>

    <!-- ============================================================
         LAYER 1: 管理面
         ============================================================ -->
    <rect x="30" y="20" width="1040" height="100" rx="10" fill="rgba(34,211,238,0.04)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="50" y="46" fill="#22d3ee" font-size="16" font-weight="700">管理面</text>
    <text x="130" y="46" fill="#64748b" font-size="16">— 人操作的地方，宕机不影响在线流量</text>

    <!-- kubectl -->
    <rect x="50" y="62" width="140" height="42" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="1.2"/>
    <text x="120" y="88" fill="white" font-size="16" font-weight="500" text-anchor="middle">kubectl / CI</text>

    <!-- Console -->
    <rect x="220" y="62" width="170" height="42" rx="6" fill="rgba(8,51,68,0.35)" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="305" y="88" fill="white" font-size="16" font-weight="500" text-anchor="middle">Higress Console</text>

    <!-- Arrow to K8s -->
    <line x1="390" y1="83" x2="460" y2="83" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arr-blue)"/>

    <!-- K8s API -->
    <rect x="465" y="62" width="280" height="42" rx="6" fill="rgba(8,51,68,0.25)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="605" y="82" fill="white" font-size="16" font-weight="600" text-anchor="middle">Kubernetes API Server</text>
    <text x="605" y="96" fill="#94a3b8" font-size="16" text-anchor="middle">WasmPlugin · McpServer · Ingress · Gateway API</text>

    <!-- ============================================================
         LAYER 2: 控制面
         ============================================================ -->
    <rect x="30" y="140" width="1040" height="160" rx="10" fill="rgba(251,146,60,0.04)" stroke="#fb923c" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="50" y="166" fill="#fb923c" font-size="16" font-weight="700">控制面</text>
    <text x="130" y="166" fill="#64748b" font-size="16">— 配置翻译 + xDS 下发，宕机后存量流量不受影响</text>

    <!-- Controller -->
    <rect x="50" y="185" width="280" height="95" rx="8" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="190" y="210" fill="white" font-size="16" font-weight="600" text-anchor="middle">higress-controller</text>
    <text x="190" y="232" fill="#94a3b8" font-size="16" text-anchor="middle">Watch K8s API → 监听 CRD 变更</text>
    <text x="190" y="250" fill="#94a3b8" font-size="16" text-anchor="middle">CRD → Istio 配置对象转换</text>
    <text x="190" y="270" fill="#fb923c" font-size="16" text-anchor="middle">Go · 集成 Nacos/ZK/Consul 服务发现</text>

    <!-- Arrow: controller → pilot -->
    <line x1="330" y1="232" x2="390" y2="232" stroke="#fb923c" stroke-width="2" marker-end="url(#arr-orange)"/>

    <!-- Pilot -->
    <rect x="395" y="185" width="280" height="95" rx="8" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1.5"/>
    <text x="535" y="210" fill="white" font-size="16" font-weight="600" text-anchor="middle">higress-pilot</text>
    <text x="535" y="232" fill="#94a3b8" font-size="16" text-anchor="middle">基于 Istio Pilot-Discovery</text>
    <text x="535" y="250" fill="#94a3b8" font-size="16" text-anchor="middle">xDS 协议服务端 (gRPC)</text>
    <text x="535" y="270" fill="#fb923c" font-size="16" text-anchor="middle">Delta 增量推送：毫秒级生效，零中断</text>

    <!-- Arrow: K8s → Controller -->
    <path d="M 605 104 L 605 130 L 190 130 L 190 183" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-orange)"/>
    <text x="400" y="124" fill="#fb923c" font-size="16">Watch CRD 变更</text>

    <!-- xDS Protocol Callout -->
    <rect x="720" y="185" width="320" height="95" rx="6" fill="rgba(251,146,60,0.05)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="880" y="208" fill="white" font-size="16" font-weight="600" text-anchor="middle">xDS Delta 增量推送</text>
    <text x="740" y="230" fill="#94a3b8" font-size="16">只推送变更部分，非全量同步</text>
    <text x="740" y="248" fill="#94a3b8" font-size="16">LDS (Listener) · RDS (Route)</text>
    <text x="740" y="266" fill="#94a3b8" font-size="16">CDS (Cluster) · EDS (Endpoint)</text>

    <!-- Arrow: Pilot pushes xDS config TO Envoy -->
    <path d="M 535 280 L 535 330 L 190 330 L 190 367" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="360" y="348" fill="#34d399" font-size="16" font-weight="600">xDS Delta 推送 (gRPC)</text>

    <!-- ============================================================
         LAYER 3: 数据面
         ============================================================ -->
    <rect x="30" y="320" width="1040" height="350" rx="10" fill="rgba(52,211,153,0.04)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="50" y="346" fill="#34d399" font-size="16" font-weight="700">数据面</text>
    <text x="130" y="346" fill="#64748b" font-size="16">— 每条请求经过这里，宕机直接丢流量</text>

    <!-- ====== Envoy Proxy — 数据面主体 ====== -->
    <rect x="50" y="365" width="780" height="260" rx="10" fill="rgba(6,78,59,0.08)" stroke="#34d399" stroke-width="2"/>
    <text x="440" y="395" fill="white" font-size="16" font-weight="700" text-anchor="middle">Envoy Proxy</text>
    <text x="440" y="415" fill="#94a3b8" font-size="16" text-anchor="middle">C++ 原生 · 事件驱动 · 非阻塞 I/O · 内置 xDS 客户端 (gRPC 从 Pilot 拉配置)</text>

    <!-- Execution order — left side -->
    <rect x="70" y="435" width="200" height="18" rx="3" fill="rgba(34,211,238,0.12)"/>
    <text x="77" y="448" fill="#22d3ee" font-size="16" font-weight="600">① 接收请求: TLS 终止 → 解析</text>

    <rect x="70" y="459" width="200" height="18" rx="3" fill="rgba(168,85,247,0.12)"/>
    <text x="77" y="472" fill="#a78bfa" font-size="16" font-weight="600">② Filter Chain 执行 →</text>

    <rect x="70" y="483" width="200" height="18" rx="3" fill="rgba(52,211,153,0.12)"/>
    <text x="77" y="496" fill="#34d399" font-size="16" font-weight="600">③ 转发请求 → 上游</text>

    <rect x="70" y="507" width="200" height="18" rx="3" fill="rgba(52,211,153,0.12)"/>
    <text x="77" y="520" fill="#34d399" font-size="16" font-weight="600">④ 接收上游响应</text>

    <rect x="70" y="531" width="200" height="18" rx="3" fill="rgba(34,211,238,0.12)"/>
    <text x="77" y="544" fill="#22d3ee" font-size="16" font-weight="600">⑤ 返回响应 → 客户端</text>

    <rect x="70" y="555" width="200" height="18" rx="3" fill="rgba(251,146,60,0.12)"/>
    <text x="77" y="568" fill="#fb923c" font-size="16" font-weight="600">⑥ ALS 日志异步推送 →</text>

    <!-- ====== Wasm 沙箱 — inside Envoy, dashed border ====== -->
    <rect x="300" y="430" width="500" height="180" rx="10" fill="rgba(168,85,247,0.05)" stroke="#a78bfa" stroke-width="2" stroke-dasharray="10,4"/>
    <text x="320" y="455" fill="#a78bfa" font-size="16" font-weight="700">Filter Chain 中的 Wasm 插件 (沙箱隔离)</text>
    <text x="320" y="472" fill="#64748b" font-size="16">内存隔离 · 故障隔离 · 热更新 · 替换 .wasm 文件即可</text>

    <!-- Plugins — 3 rows -->
    <rect x="320" y="486" width="115" height="26" rx="3" fill="rgba(168,85,247,0.12)" stroke="#a78bfa" stroke-width="0.6"/>
    <text x="377" y="503" fill="white" font-size="16" text-anchor="middle">routing-forwarding</text>

    <rect x="443" y="486" width="85" height="26" rx="3" fill="rgba(168,85,247,0.12)" stroke="#a78bfa" stroke-width="0.6"/>
    <text x="485" y="503" fill="white" font-size="16" text-anchor="middle">routing-group</text>

    <rect x="536" y="486" width="50" height="26" rx="3" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="0.6"/>
    <text x="561" y="503" fill="white" font-size="16" text-anchor="middle">auth</text>

    <rect x="594" y="486" width="110" height="26" rx="3" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="0.6"/>
    <text x="649" y="503" fill="white" font-size="16" text-anchor="middle">rate-limit ×4</text>

    <rect x="712" y="486" width="70" height="26" rx="3" fill="rgba(251,113,133,0.12)" stroke="#fb7185" stroke-width="0.6"/>
    <text x="747" y="503" fill="white" font-size="16" text-anchor="middle">breaker</text>

    <rect x="320" y="520" width="85" height="26" rx="3" fill="rgba(251,113,133,0.12)" stroke="#fb7185" stroke-width="0.6"/>
    <text x="362" y="537" fill="white" font-size="16" text-anchor="middle">fallback</text>

    <rect x="413" y="520" width="100" height="26" rx="3" fill="rgba(168,85,247,0.12)" stroke="#a78bfa" stroke-width="0.6"/>
    <text x="463" y="537" fill="white" font-size="16" text-anchor="middle">ai-statistics</text>

    <rect x="521" y="520" width="270" height="26" rx="3" fill="rgba(168,85,247,0.08)" stroke="#a78bfa" stroke-width="0.5"/>
    <text x="656" y="537" fill="#94a3b8" font-size="16" text-anchor="middle">ip-restriction · detailed-data · header-tfm ×2 · info-register</text>

    <!-- Arrow: ② → Wasm -->
    <line x1="270" y1="468" x2="298" y2="468" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>

    <!-- ====== Redis + ALS (right side) ====== -->
    <rect x="855" y="365" width="190" height="60" rx="6" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="950" y="388" fill="white" font-size="16" font-weight="600" text-anchor="middle">Redis</text>
    <text x="950" y="406" fill="#94a3b8" font-size="16" text-anchor="middle">SET · INCRBY · DECRBY</text>
    <text x="950" y="420" fill="#a78bfa" font-size="16" text-anchor="middle">跨 Pod 原子计数器</text>

    <!-- Wasm → Redis: right edge of sandbox at x=800 -->
    <line x1="800" y1="460" x2="853" y2="395" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
    <text x="827" y="420" fill="#a78bfa" font-size="16">count</text>

    <!-- ALS Pipeline -->
    <rect x="855" y="450" width="190" height="85" rx="6" fill="rgba(251,146,60,0.08)" stroke="#fb923c" stroke-width="1"/>
    <text x="950" y="472" fill="white" font-size="16" font-weight="600" text-anchor="middle">ALS 日志管线 (异步)</text>
    <text x="950" y="492" fill="#94a3b8" font-size="16" text-anchor="middle">① Envoy ALS gRPC 流</text>
    <text x="950" y="508" fill="#94a3b8" font-size="16" text-anchor="middle">② ALS Service (Go)</text>
    <text x="950" y="524" fill="#94a3b8" font-size="16" text-anchor="middle">③ Kafka 异步批写</text>

    <!-- Envoy ⑥ → ALS: route below Envoy -->
    <path d="M 270 564 L 270 640 L 855 640 L 855 533" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr)"/>
    <text x="550" y="635" fill="#fb923c" font-size="16">gRPC 流式 (异步旁路)</text>

    <!-- ============================================================
         TRAFFIC FLOW — bottom
         ============================================================ -->
    <rect x="50" y="680" width="120" height="36" rx="6" fill="#0f172a" stroke="#94a3b8" stroke-width="1.2"/>
    <text x="110" y="703" fill="white" font-size="16" font-weight="500" text-anchor="middle">Client</text>

    <path d="M 110 680 L 110 593" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#arr-blue)"/>
    <text x="95" y="640" fill="#22d3ee" font-size="16">HTTPS</text>

    <rect x="200" y="680" width="200" height="36" rx="6" fill="rgba(6,78,59,0.25)" stroke="#34d399" stroke-width="1.2"/>
    <text x="300" y="703" fill="white" font-size="16" font-weight="500" text-anchor="middle">vLLM / 厂商 API</text>

    <line x1="300" y1="678" x2="300" y2="593" stroke="#34d399" stroke-width="1.8" marker-end="url(#arr-green)"/>
    <text x="315" y="640" fill="#34d399" font-size="16">③④ 转发/返回</text>

    <!-- ============================================================
         LEGEND
         ============================================================ -->
    <text x="700" y="690" fill="white" font-size="16" font-weight="700">图例</text>

    <rect x="700" y="705" width="18" height="12" rx="2" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
    <text x="726" y="714" fill="#94a3b8" font-size="16">管理面</text>

    <rect x="790" y="705" width="18" height="12" rx="2" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/>
    <text x="816" y="714" fill="#94a3b8" font-size="16">控制面</text>

    <rect x="880" y="705" width="18" height="12" rx="2" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1"/>
    <text x="906" y="714" fill="#94a3b8" font-size="16">数据面</text>

    <rect x="700" y="726" width="18" height="12" rx="2" fill="rgba(168,85,247,0.15)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="726" y="735" fill="#94a3b8" font-size="16">Wasm 沙箱</text>

    <rect x="790" y="726" width="18" height="12" rx="2" fill="rgba(251,113,133,0.15)" stroke="#fb7185" stroke-width="1"/>
    <text x="816" y="735" fill="#94a3b8" font-size="16">认证/熔断</text>

    <rect x="880" y="726" width="18" height="12" rx="2" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1"/>
    <text x="906" y="735" fill="#94a3b8" font-size="16">日志管线</text>
  </svg>
</div>

<p class="footer">
  Higress · 基于 Istio + Envoy · Wasm 沙箱隔离 · 阿里云 99.99% SLA 生产验证
</p>

</div>
</body>
</html>
